<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JB Brush Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a4a1a 0%, #2d6a2d 100%);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
    }
    .logo {
      width: 100%;
      max-width: 420px;
      margin: 0 auto 28px;
      display: block;
      filter: invert(1);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 99px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 28px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #facc15;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .dividers {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 28px;
    }
    .pill {
      padding: 4px 14px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
    }
    .spray { background: #dcfce7; color: #166534; }
    .tree  { background: #fef9c3; color: #854d0e; }
    .footer { margin-top: 28px; font-size: 11px; color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <div class="card">
    <img src="images/logo.svg" alt="JB Brush Control" class="logo" />
    <div class="badge">
      <div class="dot"></div>
      App under construction
    </div>
    <p style="font-size:13px; color:rgba(255,255,255,0.55); line-height:1.6;">
      A full business management app is on its way —<br/>
      invoicing, scheduling, mileage, and more.
    </p>
    <div class="dividers">
      <span class="pill spray">Spray Division</span>
      <span class="pill tree">Tree Division</span>
    </div>
    <p class="footer">© 2026 JB Brush Control</p>
  </div>
</body>
</html>
